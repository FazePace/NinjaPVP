<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaPVP - Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
            background: #0a0a0a;
            padding-top: 140px;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(6px);
            transform: scale(1.08);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Dynamic Island Navbar */
        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 30px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .dynamic-island.scrolled {
            padding: 8px 16px;
            gap: 12px;
        }

        .dynamic-island:hover {
            padding: 14px 28px;
            gap: 24px;
        }

        .dynamic-island .logo {
            width: 140px;
            filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.4));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dynamic-island.scrolled .logo {
            width: 100px;
        }

        .dynamic-island:hover .logo {
            transform: scale(1.1) rotate(-2deg);
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.8));
        }

        .dynamic-island .logo img {
            width: 100%;
            height: auto;
        }

        .dynamic-island .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* View Toggle */
        .view-toggle-wrapper {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-right: 5px;
        }

        .view-toggle-btn {
            padding: 8px 16px;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            text-transform: uppercase;
        }

        .view-toggle-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .live-pulse-small {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            animation: pulseRed 1.5s infinite;
            display: inline-block;
        }

        /* Search Input */
        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 200px;
            padding: 10px 16px 10px 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .dynamic-island.scrolled .search-input {
            width: 140px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Language Selector */
        .custom-lang-wrapper {
            position: relative;
            min-width: 65px;
        }

        .lang-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 6px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .custom-lang-wrapper.open .lang-dropdown {
            opacity: 1;
            visibility: visible;
        }

        .lang-option {
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .lang-option:hover, .lang-option.active {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Hero & Animated Title */
        .hero {
            text-align: center;
            padding: 50px 0 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.12) 0%, transparent 70%);
            pointer-events: none;
            animation: heroGlow 4s ease-in-out infinite;
        }

        @keyframes heroGlow {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
        }

        .title {
            font-size: 7rem;
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(147, 51, 234, 0.4));
        }

        .title-letter {
            display: inline-block;
            background: linear-gradient(120deg,
                #a855f7 0%, #a855f7 35%,
                rgba(255,255,255,0.85) 50%,
                #a855f7 65%, #a855f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation:
                letterDrop 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards,
                titleShine 1.8s linear infinite;
            opacity: 0;
            transform: translateY(-80px);
        }

        @keyframes letterDrop {
            0%   { transform: translateY(-80px); opacity: 0; }
            60%  { transform: translateY(8px);   opacity: 1; }
            100% { transform: translateY(0);     opacity: 1; }
        }

        @keyframes titleShine {
            0%   { background-position: 100% center; }
            100% { background-position: -100% center; }
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Stats Block */
        .stats-block {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .stat-value.highlight {
            color: #FFD700;
        }

        /* Nav Tabs — just the icon circle + label, no outer pill */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 55px;
            overflow-x: auto;
            overflow-y: visible;   /* NEVER clip the glow at top */
            padding: 50px 20px 10px;  /* generous top so pulse glow is never cut */
            scrollbar-width: none;
        }

        .nav-tabs::-webkit-scrollbar { display: none; }

        .tab-btn {
            background: transparent;
            border: none;
            padding: 0;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .tab-btn:hover  { color: #ffffff; transform: translateY(-5px); }
        .tab-btn.active { color: #ffffff; transform: translateY(-7px); }

        /* The circle that wraps the icon — THIS is the only visible frame */
        .tab-icon {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.35s ease;
            backdrop-filter: blur(12px);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.12),
                0 6px 20px rgba(0,0,0,0.35);
        }

        /* ── Per-mode color tokens ── */
        .tab-btn[data-mode="overall"] { --mc: 255,215,0; }
        .tab-btn[data-mode="sword"]   { --mc: 59,130,246; }
        .tab-btn[data-mode="pot"]     { --mc: 236,72,153; }
        .tab-btn[data-mode="axe"]     { --mc: 180,180,200; }
        .tab-btn[data-mode="mace"]    { --mc: 30,64,175; }
        .tab-btn[data-mode="netherop"]{ --mc: 168,85,247; }
        .tab-btn[data-mode="smp"]     { --mc: 34,197,94; }
        .tab-btn[data-mode="uhc"]     { --mc: 239,68,68; }
        .tab-btn[data-mode="vanilla"] { --mc: 217,119,156; }

        /* Gentle breathing glow for active tab */
        @keyframes modeGlowPulse {
            0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 18px rgba(var(--mc),0.4), 0 8px 24px rgba(0,0,0,0.5); }
            50%       { box-shadow: inset 0 1px 0 rgba(255,255,255,0.2), 0 0 32px rgba(var(--mc),0.7), 0 8px 24px rgba(0,0,0,0.5); }
        }

        .tab-btn.active .tab-icon {
            background: rgba(var(--mc),0.12);
            border-color: rgba(var(--mc),0.45);
            animation: modeGlowPulse 2.5s ease-in-out infinite;
            transform: scale(1.1);
        }

        .tab-btn:hover .tab-icon {
            background: rgba(var(--mc),0.1);
            border-color: rgba(var(--mc),0.35);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.18), 0 0 18px rgba(var(--mc),0.45), 0 6px 18px rgba(0,0,0,0.4);
            transform: scale(1.06);
        }

        .tab-icon img {
            width: 54px;
            height: 54px;
            object-fit: contain;
            filter: brightness(1.3);
            position: relative;
            z-index: 1;
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .tab-btn.active .tab-icon img,
        .tab-btn:hover .tab-icon img {
            filter: brightness(1.9) drop-shadow(0 0 8px rgba(var(--mc),0.7));
            transform: scale(1.1);
        }

        .tab-btn span {
            font-size: 0.82rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        /* Ranking Table */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking-table th {
            padding: 20px;
            text-align: left;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking-table td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ── Leaderboard table rows ── */
        .leaderboard-row {
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .leaderboard-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Top 1/2/3 row tints */
        .leaderboard-row.top-1 { background: rgba(255, 215, 0,  0.04); }
        .leaderboard-row.top-2 { background: rgba(192, 192, 192, 0.04); }
        .leaderboard-row.top-3 { background: rgba(205, 127, 50, 0.04); }

        /* Rank column */
        .col-rank {
            width: 90px;
            vertical-align: middle;
        }

        .rank-standard {
            font-size: 1.6rem;
            font-weight: 900;
            color: rgba(255,255,255,0.5);
            padding-left: 20px;
        }

        /* Diagonal ribbon banners for #1 #2 #3 */
        .rank-banner {
            display: inline-flex;
            align-items: center;
            padding: 8px 28px 8px 20px;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            border-radius: 4px 0 0 4px;
            min-width: 80px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .rank-banner::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
            animation: bannerShine 3s infinite linear;
        }

        @keyframes bannerShine {
            0%   { left: -100%; }
            100% { left: 100%; }
        }

        .rank-banner.gold   { background: linear-gradient(135deg, #FFD700, #FFA500); box-shadow: 0 0 18px rgba(255,215,0,0.5); }
        .rank-banner.silver { background: linear-gradient(135deg, #D0D0D0, #A0A0A0); box-shadow: 0 0 18px rgba(200,200,200,0.4); }
        .rank-banner.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); box-shadow: 0 0 18px rgba(205,127,50,0.4); }

        /* Player cell */
        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Skin: use full body — natural portrait, no squish */
        .player-skin {
            width: 52px;
            height: 104px;        /* 1:2 aspect = full Minecraft body proportion */
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            overflow: visible;
        }

        .player-skin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom center;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .leaderboard-row:hover .player-skin img {
            transform: scale(1.08) translateY(-4px);
            filter: drop-shadow(0 12px 18px rgba(0,0,0,0.7)) brightness(1.1);
        }

        /* Top-3 rows get taller skins */
        .leaderboard-row.top-1 .player-skin,
        .leaderboard-row.top-2 .player-skin,
        .leaderboard-row.top-3 .player-skin {
            width: 64px;
            height: 128px;
        }

        .player-name {
            font-weight: 800;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .player-elo-info {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        .player-elo-highlight {
            color: #FFD700;
            font-weight: 800;
        }

        /* Modalities column in leaderboard — big circles, NO sun-ray animation */
        .col-modalities {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            align-items: center;
            flex-wrap: wrap;
            padding-right: 10px;
            margin-top: 12px;
        }

        .modality-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            cursor: default;
            transition: transform 0.25s ease;
        }

        .modality-group:hover { transform: translateY(-4px); }

        /* Circle wrapping the icon */
        .modality-circle-wrap {
            width: 62px;
            height: 62px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.14);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            backdrop-filter: blur(12px);
            box-shadow:
                inset 0 1px 0 rgba(255,255,255,0.12),
                0 4px 12px rgba(0,0,0,0.3);
        }

        /* Static top-highlight only — NO rotation */
        .modality-circle-wrap::before {
            content: '';
            position: absolute;
            top: 0; left: 10%; right: 10%;
            height: 45%;
            background: linear-gradient(to bottom, rgba(255,255,255,0.14), transparent);
            border-radius: 0 0 50% 50%;
            pointer-events: none;
        }

        /* ── Per-mode color tokens for leaderboard modalities ── */
        .modality-group[data-modality="sword"]    { --mc: 59,130,246; }
        .modality-group[data-modality="pot"]      { --mc: 236,72,153; }
        .modality-group[data-modality="axe"]      { --mc: 180,180,200; }
        .modality-group[data-modality="mace"]     { --mc: 30,64,175; }
        .modality-group[data-modality="netherop"] { --mc: 168,85,247; }
        .modality-group[data-modality="smp"]      { --mc: 34,197,94; }
        .modality-group[data-modality="uhc"]      { --mc: 239,68,68; }
        .modality-group[data-modality="vanilla"]  { --mc: 217,119,156; }

        /* Breathing glow for hovered modality circle */
        @keyframes modalityGlow {
            0%, 100% { box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 0 12px rgba(var(--mc),0.35), 0 4px 10px rgba(0,0,0,0.35); }
            50%       { box-shadow: inset 0 1px 0 rgba(255,255,255,0.14), 0 0 22px rgba(var(--mc),0.65), 0 4px 10px rgba(0,0,0,0.35); }
        }

        .modality-group:hover .modality-circle-wrap {
            background: rgba(var(--mc),0.12);
            border-color: rgba(var(--mc),0.4);
            animation: modalityGlow 2s ease-in-out infinite;
            transform: scale(1.1);
        }

        .modality-icon {
            width: 38px;
            height: 38px;
            object-fit: contain;
            filter: brightness(1.4);
            position: relative;
            z-index: 1;
            transition: filter 0.25s ease;
        }

        .modality-group:hover .modality-icon {
            filter: brightness(2) drop-shadow(0 0 8px rgba(var(--mc),0.7));
        }

        /* Rank chip */
        .modality-badge-chip {
            background: rgba(15,15,20,0.9);
            border: 1px solid rgba(255,255,255,0.14);
            border-radius: 20px;
            padding: 3px 11px;
            font-size: 0.78rem;
            font-weight: 800;
            box-shadow: 0 2px 6px rgba(0,0,0,0.4);
        }

        .modality-rank.top-1 { color: #FFD700; font-weight: 900; }
        .modality-rank.top-2 { color: #C0C0C0; font-weight: 900; }
        .modality-rank.top-3 { color: #CD7F32; font-weight: 900; }
        .modality-rank       { color: rgba(255,255,255,0.75); font-weight: 700; }

        /* Live Fights Standing View */
        .live-view-container {
            padding: 40px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .live-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .live-header-title {
            font-size: 4rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
        }

        .live-dot-large {
            width: 25px;
            height: 25px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff4444;
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .live-fights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 30px;
        }

        .live-fight-card {
            background: rgba(25, 25, 30, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .live-fight-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .fight-arena-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .arena-mode {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #d8b4fe;
            text-transform: uppercase;
        }

        .fight-combatants {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .fighter {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 2;
        }

        .fighter-skin-container {
            width: 100px;
            height: 200px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .fighter-skin-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fighter-name {
            font-size: 1.3rem;
            font-weight: 900;
        }

        .fighter-elo {
            font-size: 0.9rem;
            color: #FFD700;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 10px;
        }

        .health-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .health-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            transition: width 0.3s ease;
        }

        .health-text {
            font-size: 0.8rem;
            color: #ff8888;
            font-weight: 800;
        }

        .fight-vs {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .no-fights-msg {
            text-align: center;
            padding: 100px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2rem;
        }

        /* Player Modal */
        .player-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .player-modal.active { display: flex; }

        .modal-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: rgba(25, 25, 30, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            padding: 40px;
            z-index: 2001;
        }

        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: #fff; font-size: 2rem; cursor: pointer;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .modal-player-skin {
            width: 120px;
            height: 120px;
            border-radius: 20px;
        }

        .modal-player-name { font-size: 3rem; font-weight: 900; }

        .modal-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .modal-stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .modal-stat-value { font-size: 1.8rem; font-weight: 800; }
        .modal-stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }

        /* ══ PLAYER MODAL — Premium Liquid Glass ══ */
        .player-modal {
            position: fixed; inset: 0;
            display: none; justify-content: center; align-items: center;
            z-index: 2000;
        }
        .player-modal.active { display: flex; }

        .modal-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.80);
            backdrop-filter: blur(18px);
        }

        .modal-content {
            background: rgba(14,14,18,0.92);
            backdrop-filter: blur(40px) saturate(180%);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            width: 92%; max-width: 860px;
            max-height: 90vh; overflow-y: auto;
            position: relative;
            padding: 0 0 36px;
            z-index: 2001;
            box-shadow:
                0 0 0 1px rgba(255,255,255,0.05),
                0 30px 60px rgba(0,0,0,0.7),
                0 0 80px rgba(147,51,234,0.12);
        }

        /* Scrollbar style inside modal */
        .modal-content::-webkit-scrollbar { width: 4px; }
        .modal-content::-webkit-scrollbar-track { background: transparent; }
        .modal-content::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        .modal-close {
            position: absolute; top: 16px; right: 16px;
            width: 34px; height: 34px; border-radius: 50%;
            background: rgba(255,255,255,0.07);
            border: 1px solid rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6); font-size: 1rem;
            cursor: pointer; display: flex; align-items: center; justify-content: center;
            transition: all 0.2s ease; z-index: 10;
        }
        .modal-close:hover { background: rgba(255,255,255,0.14); color: #fff; }

        /* Header with subtle purple gradient bg */
        .modal-header {
            display: flex; align-items: flex-end; gap: 24px;
            padding: 32px 32px 24px;
            margin-bottom: 0;
            background: linear-gradient(135deg, rgba(147,51,234,0.08) 0%, rgba(255,255,255,0.02) 60%, transparent 100%);
            border-bottom: 1px solid rgba(255,255,255,0.07);
            border-radius: 30px 30px 0 0;
        }
        .modal-player-skin {
            width: 80px; height: 160px;
            object-fit: contain; object-position: bottom center;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.8)) drop-shadow(0 0 20px rgba(147,51,234,0.3));
            flex-shrink: 0;
        }
        .modal-player-name {
            font-size: 2.6rem; font-weight: 900; letter-spacing: -1.5px;
            background: linear-gradient(to right, #fff 60%, rgba(255,255,255,0.6));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .modal-player-elo  { font-size: 1rem; font-weight: 700; color: #FFD700; margin-top: 6px;
            text-shadow: 0 0 12px rgba(255,215,0,0.4); }
        .modal-player-rank { font-size: 0.8rem; color: rgba(255,255,255,0.38); margin-top: 2px; }

        /* Stat pills section */
        .modal-stats-section {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .modal-stats-grid {
            display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
        }
        .modal-stat-card {
            display: flex; flex-direction: column; align-items: center;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
            padding: 18px 28px; gap: 5px;
            backdrop-filter: blur(12px);
            transition: all 0.25s ease;
            min-width: 120px;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 4px 12px rgba(0,0,0,0.3);
        }
        .modal-stat-card:hover {
            background: rgba(255,255,255,0.09);
            transform: translateY(-2px);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.12), 0 8px 20px rgba(0,0,0,0.4);
        }
        .modal-stat-circle { display: contents; }
        .modal-stat-value { font-size: 2rem; font-weight: 900; color: #fff; line-height: 1; }
        .modal-stat-label { font-size: 0.62rem; font-weight: 700; color: rgba(255,255,255,0.38); text-transform: uppercase; letter-spacing: 1.2px; }

        /* Modality section */
        .modal-modality-section {
            padding: 24px 32px 0;
        }
        .modal-section-title {
            font-size: 0.65rem; font-weight: 800; color: rgba(255,255,255,0.3);
            text-transform: uppercase; letter-spacing: 2px;
            margin-bottom: 14px;
        }

        /* Modality grid — 4 columns, each card self-contained */
        .modal-modality-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }

        /* Per-mode accent colors */
        .modality-stat-card[data-mode="overall"] { --mc: 255,215,0; }
        .modality-stat-card[data-mode="sword"]   { --mc: 59,130,246; }
        .modality-stat-card[data-mode="pot"]     { --mc: 236,72,153; }
        .modality-stat-card[data-mode="axe"]     { --mc: 180,180,200; }
        .modality-stat-card[data-mode="mace"]    { --mc: 30,64,175; }
        .modality-stat-card[data-mode="netherop"]{ --mc: 168,85,247; }
        .modality-stat-card[data-mode="smp"]     { --mc: 34,197,94; }
        .modality-stat-card[data-mode="uhc"]     { --mc: 239,68,68; }
        .modality-stat-card[data-mode="vanilla"] { --mc: 217,119,156; }

        /* Card entrance animation */
        @keyframes cardEntrance {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* Each card: vertical layout, centered, compact */
        .modality-stat-card {
            background: rgba(var(--mc),0.05);
            border: 1px solid rgba(var(--mc),0.2);
            border-radius: 16px;
            padding: 18px 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            transition: all 0.25s ease;
            backdrop-filter: blur(12px);
            box-shadow: 0 0 0 1px rgba(var(--mc),0.05), inset 0 1px 0 rgba(255,255,255,0.06);
            animation: cardEntrance 0.4s ease both;
        }

        /* Stagger delay by position */
        .modality-stat-card:nth-child(1) { animation-delay: 0.05s; }
        .modality-stat-card:nth-child(2) { animation-delay: 0.10s; }
        .modality-stat-card:nth-child(3) { animation-delay: 0.15s; }
        .modality-stat-card:nth-child(4) { animation-delay: 0.20s; }
        .modality-stat-card:nth-child(5) { animation-delay: 0.25s; }
        .modality-stat-card:nth-child(6) { animation-delay: 0.30s; }
        .modality-stat-card:nth-child(7) { animation-delay: 0.35s; }
        .modality-stat-card:nth-child(8) { animation-delay: 0.40s; }

        .modality-stat-card:hover {
            background: rgba(var(--mc),0.12);
            border-color: rgba(var(--mc),0.45);
            box-shadow: 0 0 22px rgba(var(--mc),0.3), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(-4px) scale(1.02);
        }

        /* Circular icon — large and prominent */
        .modality-stat-circle {
            width: 110px; height: 110px;
            border-radius: 50%; flex-shrink: 0;
            background: rgba(var(--mc),0.15);
            border: 1.5px solid rgba(var(--mc),0.45);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 32px rgba(var(--mc),0.4), inset 0 1px 0 rgba(255,255,255,0.16);
            animation: iconFloat 4s ease-in-out infinite;
        }

        @keyframes iconFloat {
            0%, 100% { transform: translateY(0px); }
            50%       { transform: translateY(-6px); }
        }

        .modality-stat-icon {
            width: 64px; height: 64px; object-fit: contain;
            filter: brightness(1.8) drop-shadow(0 0 10px rgba(var(--mc),0.65));
        }

        /* Text block — centered, compact */
        .modality-stat-info {
            display: flex; flex-direction: column; align-items: center;
            gap: 2px; width: 100%; min-width: 0;
        }
        .modality-stat-name {
            font-size: 0.6rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 1px; color: rgba(var(--mc),0.85);
        }
        .modality-stat-elo  { font-size: 1.05rem; font-weight: 900; color: #fff; }
        .modality-stat-winrate { font-size: 0.72rem; font-weight: 700; }
        .modality-stat-details {
            display: flex; gap: 14px; margin-top: 4px;
            padding-top: 6px;
            border-top: 1px solid rgba(var(--mc),0.12);
            width: 100%; justify-content: center;
        }
        .modality-stat-detail { text-align: center; }
        .modality-stat-value-small { font-size: 0.82rem; font-weight: 800; color: rgba(255,255,255,0.85); display: block; }
        .modality-stat-label-small { font-size: 0.55rem; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.5px; display: block; }

        /* Modality grid — 2 clean columns */
        .modal-modality-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
        }

        /* Per-mode accent colors */
        .modality-stat-card[data-mode="overall"] { --mc: 255,215,0; }
        .modality-stat-card[data-mode="sword"]   { --mc: 59,130,246; }
        .modality-stat-card[data-mode="pot"]     { --mc: 236,72,153; }
        .modality-stat-card[data-mode="axe"]     { --mc: 180,180,200; }
        .modality-stat-card[data-mode="mace"]    { --mc: 30,64,175; }
        .modality-stat-card[data-mode="netherop"]{ --mc: 168,85,247; }
        .modality-stat-card[data-mode="smp"]     { --mc: 34,197,94; }
        .modality-stat-card[data-mode="uhc"]     { --mc: 239,68,68; }
        .modality-stat-card[data-mode="vanilla"] { --mc: 217,119,156; }

        .modality-stat-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.07);
            border-left: 3px solid rgba(var(--mc),0.7);
            border-radius: 14px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.25s ease;
            backdrop-filter: blur(10px);
            min-width: 0;          /* prevents flex overflow */
        }

        .modality-stat-card:hover {
            background: rgba(var(--mc),0.08);
            border-color: rgba(var(--mc),0.35);
            box-shadow: 0 0 16px rgba(var(--mc),0.2);
            transform: translateX(3px);
        }

        /* (duplicate removed — sizes now set above at 90px/56px) */

        /* Text block — flex column, clips cleanly */
        .modality-stat-info {
            display: flex; flex-direction: column; gap: 2px;
            flex: 1; min-width: 0;
        }
        .modality-stat-name {
            font-size: 0.68rem; font-weight: 800; text-transform: uppercase;
            letter-spacing: 0.8px; color: rgba(var(--mc),0.95);
            white-space: nowrap;
        }
        .modality-stat-elo  { font-size: 1rem; font-weight: 900; color: #fff; line-height: 1.2; }
        .modality-stat-winrate { font-size: 0.75rem; font-weight: 700; }
        .modality-stat-details {
            display: flex; gap: 12px; margin-top: 3px;
        }
        .modality-stat-detail { text-align: left; }
        .modality-stat-value-small { font-size: 0.82rem; font-weight: 800; color: rgba(255,255,255,0.85); display: block; }
        .modality-stat-label-small { font-size: 0.58rem; color: rgba(255,255,255,0.35); text-transform: uppercase; letter-spacing: 0.5px; display: block; }

        /* ── Live fight entrance & damage animations ── */
        @keyframes fightEntrance {
            from { opacity: 0; transform: translateY(28px) scale(0.96); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .fight-entrance {
            animation: fightEntrance 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }
        .fight-entrance:nth-child(2) { animation-delay: 0.12s; }

        @keyframes damageShake {
            0%   { transform: translateX(0)    brightness(1); }
            15%  { transform: translateX(-6px); filter: brightness(2) drop-shadow(0 0 12px #ff4444); }
            30%  { transform: translateX(6px); }
            45%  { transform: translateX(-4px); }
            60%  { transform: translateX(4px); }
            75%  { transform: translateX(-2px); }
            100% { transform: translateX(0); filter: brightness(1); }
        }
        .damage-hit { animation: damageShake 0.45s ease both; }

        .damage-number {
            position: absolute;
            top: 10px; left: 50%;
            transform: translateX(-50%);
            color: #ff4444;
            font-size: 1.6rem; font-weight: 900;
            pointer-events: none;
            text-shadow: 0 0 12px rgba(255,68,68,0.9), 0 2px 4px rgba(0,0,0,0.8);
            z-index: 50;
            animation: dmgFloat 0.9s ease forwards;
        }
        @keyframes dmgFloat {
            0%   { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-55px); }
        }

        /* Health bar smooth transition */
        .health-fill { transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        @media (max-width: 768px) {
            .title { font-size: 3rem; }
            .live-header-title { font-size: 2rem; }
            .live-fights-grid { grid-template-columns: 1fr; }
            .modal-header { flex-direction: column; text-align: center; }
            .modal-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="./assets/bg-video.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <nav class="dynamic-island" id="dynamic-island">
        <div class="logo" onclick="scrollToTop()">
            <img src="./assets/logo.png" alt="NinjaPVP Logo">
        </div>

        <div class="header-right">
            <div class="view-toggle-wrapper">
                <button class="view-toggle-btn active" id="btn-leaderboard" onclick="switchView('leaderboard')">RANKING</button>
                <button class="view-toggle-btn" id="btn-live" onclick="switchView('live')">LIVE <span class="live-pulse-small"></span></button>
            </div>
            <div class="search-wrapper" id="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search player..." id="search-input">
            </div>
            <div class="custom-lang-wrapper" id="lang-selector-wrapper">
                <div class="lang-button" id="lang-btn">
                    <span id="lang-current">EN</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="lang-dropdown">
                    <div class="lang-option active" data-value="en">EN</div>
                    <div class="lang-option" data-value="es">ES</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- LEADERBOARD VIEW -->
        <div id="leaderboard-view">
            <section class="hero">
                <h1 class="title" id="title"></h1>
                <p class="subtitle" id="hero-subtitle">The most competitive PvP server, featuring a fully custom and exclusive ELO ranking system.</p>
            </section>

            <section class="stats-block">
                <div class="stat-item">
                    <div class="stat-label">Top Player</div>
                    <div class="stat-value highlight" id="stat-top-player">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Active Players</div>
                    <div class="stat-value" id="stat-active-players">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Total Matches</div>
                    <div class="stat-value" id="stat-matches">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Average ELO</div>
                    <div class="stat-value" id="stat-avg-elo">-</div>
                </div>
            </section>

            <nav class="nav-tabs" id="nav-tabs">
                <button class="tab-btn active" data-mode="overall">
                    <div class="tab-icon"><img src="./assets/earth.png" alt="Overall"></div>
                    <span>Overall</span>
                </button>
                <button class="tab-btn" data-mode="sword">
                    <div class="tab-icon"><img src="./assets/sword.png" alt="Sword"></div>
                    <span>Sword</span>
                </button>
                <button class="tab-btn" data-mode="pot">
                    <div class="tab-icon"><img src="./assets/potion.png" alt="Pot"></div>
                    <span>Pot</span>
                </button>
                <button class="tab-btn" data-mode="axe">
                    <div class="tab-icon"><img src="./assets/axe.png" alt="Axe"></div>
                    <span>Axe</span>
                </button>
                <button class="tab-btn" data-mode="mace">
                    <div class="tab-icon"><img src="./assets/mace.png" alt="Mace"></div>
                    <span>Mace</span>
                </button>
                <button class="tab-btn" data-mode="netherop">
                    <div class="tab-icon"><img src="./assets/netherop.png" alt="NetherOP"></div>
                    <span>NetherOP</span>
                </button>
                <button class="tab-btn" data-mode="smp">
                    <div class="tab-icon"><img src="./assets/smp.png" alt="SMP"></div>
                    <span>SMP</span>
                </button>
                <button class="tab-btn" data-mode="uhc">
                    <div class="tab-icon"><img src="./assets/uhc.png" alt="UHC"></div>
                    <span>UHC</span>
                </button>
                <button class="tab-btn" data-mode="vanilla">
                    <div class="tab-icon"><img src="./assets/vanilla.png" alt="Vanilla"></div>
                    <span>Vanilla</span>
                </button>
            </nav>

            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>PLAYER</th>
                        <th style="text-align: right;">MODALITIES</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <!-- Loaded via script.js -->
                </tbody>
            </table>
        </div>

        <!-- LIVE VIEW -->
        <div id="live-view" style="display: none;" class="live-view-container">
            <div class="live-header">
                <h1 class="live-header-title">
                    <div class="live-dot-large"></div>
                    <span id="live-fights-title">LIVE FIGHTS</span>
                </h1>
            </div>
            <div class="live-fights-grid" id="fights-list">
                <!-- Loaded via inline script -->
            </div>
        </div>

        <!-- Player Profile Modal -->
        <div id="player-modal" class="player-modal">
            <div class="modal-overlay" onclick="closePlayerModal()"></div>
            <div class="modal-content">
                <button class="modal-close" onclick="closePlayerModal()">×</button>

                <!-- Header -->
                <div class="modal-header">
                    <img id="modal-player-skin" class="modal-player-skin" src="" alt="Player Skin">
                    <div class="modal-player-info">
                        <h2 id="modal-player-name" class="modal-player-name">Player Name</h2>
                        <p id="modal-player-elo" class="modal-player-elo">ELO: 0</p>
                        <p id="modal-player-global-rank" class="modal-player-rank">Global Rank: #0</p>
                    </div>
                </div>

                <!-- Overall stats row -->
                <div class="modal-stats-section">
                    <div class="modal-stats-grid">
                        <div class="modal-stat-card">
                            <div class="modal-stat-value" id="modal-total-wins">0</div>
                            <div class="modal-stat-label">Wins</div>
                        </div>
                        <div class="modal-stat-card">
                            <div class="modal-stat-value" id="modal-total-losses">0</div>
                            <div class="modal-stat-label">Losses</div>
                        </div>
                        <div class="modal-stat-card">
                            <div class="modal-stat-value" id="modal-total-winrate">0%</div>
                            <div class="modal-stat-label">Winrate</div>
                        </div>
                        <div class="modal-stat-card">
                            <div class="modal-stat-value" id="modal-total-games">0</div>
                            <div class="modal-stat-label">Games</div>
                        </div>
                    </div>
                </div>

                <!-- Per-modality grid -->
                <div class="modal-modality-section">
                    <div class="modal-section-title">By Modality</div>
                    <div id="modal-modality-grid" class="modal-modality-grid"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Server Stats
        async function fetchServerStatus() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/ninjapvp.me');
                const data = await response.json();
                if (data.online) {
                    const activePlayersEl = document.getElementById('stat-active-players');
                    if (activePlayersEl) activePlayersEl.textContent = data.players.online;
                }
            } catch (e) { console.log("Status error", e); }
        }
        fetchServerStatus();
        setInterval(fetchServerStatus, 30000);

        // View Switching
        function switchView(view) {
            const btnLeaderboard = document.getElementById('btn-leaderboard');
            const btnLive = document.getElementById('btn-live');
            const viewLeaderboard = document.getElementById('leaderboard-view');
            const viewLive = document.getElementById('live-view');
            const searchContainer = document.getElementById('search-container');

            if (view === 'leaderboard') {
                btnLeaderboard.classList.add('active');
                btnLive.classList.remove('active');
                viewLeaderboard.style.display = 'block';
                viewLive.style.display = 'none';
                searchContainer.style.display = 'block';
            } else {
                btnLive.classList.add('active');
                btnLeaderboard.classList.remove('active');
                viewLive.style.display = 'block';
                viewLeaderboard.style.display = 'none';
                searchContainer.style.display = 'none';
                updateLiveFights(); // Immediate update
            }
        }

        // Live Fights Rendering & Simulation
        const fightsList = document.getElementById('fights-list');
        const liveFightsTitle = document.getElementById('live-fights-title');
        let demoFights = null; // Persist demo state
        let isOnline = false;

        function triggerDamageEffect(fighterEl, damage) {
            fighterEl.classList.remove('damage-hit');
            void fighterEl.offsetWidth; // trigger reflow
            fighterEl.classList.add('damage-hit');
            
            // Create floating damage number
            const dmgNum = document.createElement('div');
            dmgNum.className = 'damage-number';
            dmgNum.textContent = `-${damage}`;
            fighterEl.appendChild(dmgNum);
            setTimeout(() => dmgNum.remove(), 900);
        }

        async function updateLiveFights() {
            if (document.getElementById('live-view').style.display === 'none') return;
            
            try {
                const response = await fetch('http://ninjapvp.tarohosting.com:8080/live');
                if (!response.ok) throw new Error('Offline');
                const fights = await response.json();
                isOnline = true;
                demoFights = null; // clear demo if online
                
                liveFightsTitle.textContent = currentLang === 'en' ? 'LIVE FIGHTS' : 'PELEAS EN VIVO';
                
                if (!fights || fights.length === 0) {
                    fightsList.innerHTML = `<div class="no-fights-msg">${currentLang === 'en' ? 'No active fights at the moment.' : 'No hay combates activos en este momento.'}</div>`;
                    return;
                }
                
                fightsList.innerHTML = fights.map(f => {
                    const p1hp = Math.max(0, Math.min(100, (f.p1Health / 20.0) * 100));
                    const p2hp = Math.max(0, Math.min(100, (f.p2Health / 20.0) * 100));
                    return `
                    <div class="live-fight-card fight-entrance">
                        <div class="fight-arena-info">
                            <span class="arena-mode">${f.mode}</span>
                            <span style="font-size: 0.7rem; color: rgba(255,255,255,0.3);">${f.world}</span>
                        </div>
                        <div class="fight-combatants">
                            <div class="fighter" id="f-${f.p1}">
                                <div class="fighter-skin-container">
                                    <img src="https://mc-heads.net/body/${f.p1}/200" alt="${f.p1}">
                                </div>
                                <span class="fighter-name">${f.p1}</span>
                                <span class="fighter-elo">${f.p1Elo} ELO</span>
                                <div class="health-wrapper">
                                    <div class="health-bar-container"><div class="health-fill" style="width: ${p1hp}%;"></div></div>
                                    <span class="health-text">${f.p1Health} ♥</span>
                                </div>
                            </div>
                            <div class="fight-vs">VS</div>
                            <div class="fighter" id="f-${f.p2}">
                                <div class="fighter-skin-container">
                                    <img src="https://mc-heads.net/body/${f.p2}/200" alt="${f.p2}" style="transform: scaleX(-1);">
                                </div>
                                <span class="fighter-name">${f.p2}</span>
                                <span class="fighter-elo">${f.p2Elo} ELO</span>
                                <div class="health-wrapper">
                                    <div class="health-bar-container"><div class="health-fill" style="width: ${p2hp}%;"></div></div>
                                    <span class="health-text">${f.p2Health} ♥</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                isOnline = false;
                // If we don't have demo data yet, initialize it
                if (!demoFights) {
                    demoFights = [
                        { id: 1, p1: 'NOT_VOIDD', p1Elo: 1240, p1h: 20, p2: 'Aris_el_babas', p2Elo: 980, p2h: 20, mode: 'SWORD', world: 'Arena-1' },
                        { id: 2, p1: 'xX_Ninja_Xx', p1Elo: 860, p1h: 20, p2: 'Shadow_GG', p2Elo: 775, p2h: 20, mode: 'POT', world: 'Arena-2' }
                    ];
                    renderDemoFights();
                }
                simulateCombat();
            }
        }

        function renderDemoFights() {
            fightsList.innerHTML = demoFights.map(f => {
                const p1hp = (f.p1h / 20) * 100;
                const p2hp = (f.p2h / 20) * 100;
                return `
                <div class="live-fight-card fight-entrance" id="fight-${f.id}">
                    <div class="fight-arena-info">
                        <span class="arena-mode">${f.mode}</span>
                        <span style="font-size:0.7rem;color:rgba(255,255,255,0.3);">${f.world} &bull; DEMO</span>
                    </div>
                    <div class="fight-combatants">
                        <div class="fighter p1-side">
                            <div class="fighter-skin-container"><img src="https://mc-heads.net/body/${f.p1}/200" alt="${f.p1}"></div>
                            <span class="fighter-name">${f.p1}</span>
                            <span class="fighter-elo">${f.p1Elo} ELO</span>
                            <div class="health-wrapper">
                                <div class="health-bar-container"><div class="health-fill" style="width:${p1hp}%;"></div></div>
                                <span class="health-text">${f.p1h} ♥</span>
                            </div>
                        </div>
                        <div class="fight-vs">VS</div>
                        <div class="fighter p2-side">
                            <div class="fighter-skin-container"><img src="https://mc-heads.net/body/${f.p2}/200" alt="${f.p2}" style="transform:scaleX(-1);"></div>
                            <span class="fighter-name">${f.p2}</span>
                            <span class="fighter-elo">${f.p2Elo} ELO</span>
                            <div class="health-wrapper">
                                <div class="health-bar-container"><div class="health-fill" style="width:${p2hp}%;"></div></div>
                                <span class="health-text">${f.p2h} ♥</span>
                            </div>
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function simulateCombat() {
            if (!demoFights) return;
            demoFights.forEach(f => {
                if (f.p1h <= 0 || f.p2h <= 0) {
                    // One player died, reset fight after a short delay
                    if (!f.resetting) {
                        f.resetting = true;
                        setTimeout(() => {
                            f.p1h = 20; f.p2h = 20; f.resetting = false;
                            const card = document.getElementById(`fight-${f.id}`);
                            if (card) {
                                card.classList.remove('fight-entrance');
                                void card.offsetWidth;
                                card.classList.add('fight-entrance');
                                updateFighterUI(f, 1); updateFighterUI(f, 2);
                            }
                        }, 2500);
                    }
                    return;
                }

                // Randomly pick a victim
                if (Math.random() > 0.65) {
                    const victim = Math.random() > 0.5 ? 1 : 2;
                    const damage = Math.floor(Math.random() * 2) + 1; // 1 or 2 hearts
                    if (victim === 1) f.p1h = Math.max(0, f.p1h - damage);
                    else f.p2h = Math.max(0, f.p2h - damage);

                    updateFighterUI(f, victim, damage);
                }
            });
        }

        function updateFighterUI(fight, victimIdx, damage = 0) {
            const card = document.getElementById(`fight-${fight.id}`);
            if (!card) return;
            const fighterEl = card.querySelector(victimIdx === 1 ? '.p1-side' : '.p2-side');
            if (!fighterEl) return;
            
            const health = victimIdx === 1 ? fight.p1h : fight.p2h;
            const healthFill = fighterEl.querySelector('.health-fill');
            const healthText = fighterEl.querySelector('.health-text');
            
            if (healthFill) healthFill.style.width = `${(health / 20) * 100}%`;
            if (healthText) healthText.textContent = `${health} ♥`;
            
            if (damage > 0) triggerDamageEffect(fighterEl, damage);
        }

        setInterval(() => {
            if (!isOnline) simulateCombat();
        }, 1200);

        setInterval(updateLiveFights, 5000);

        // Dynamic Island scroll effect
        window.addEventListener('scroll', () => {
            const island = document.getElementById('dynamic-island');
            if (window.scrollY > 100) island.classList.add('scrolled');
            else island.classList.remove('scrolled');
        });

        // Initialize Title Animation — letter-drop with purple shine
        function createAnimatedTitle() {
            const el = document.getElementById('title');
            if (!el) return;
            const text = 'NinjaPVP';
            el.innerHTML = '';
            text.split('').forEach((letter, i) => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.className = 'title-letter';
                span.style.animationDelay = `${i * 0.09}s`;
                el.appendChild(span);
            });
        }
        createAnimatedTitle();

    </script>
</body>

</html>
