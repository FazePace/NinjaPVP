<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NinjaPVP - Premium Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: #ffffff;
            min-height: 100vh;
            position: relative;
            background: #0a0a0a;
            padding-top: 140px;
        }

        /* Video Background */
        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }

        .video-background video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: blur(6px);
            transform: scale(1.08);
        }

        .video-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.75);
            z-index: -1;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 20px;
        }

        /* Dynamic Island Navbar */
        .dynamic-island {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 30px;
            padding: 12px 24px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: all 0.3s cubic-bezier(0.23, 1, 0.32, 1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .dynamic-island.scrolled {
            padding: 8px 16px;
            gap: 12px;
        }

        .dynamic-island:hover {
            padding: 14px 28px;
            gap: 24px;
        }

        .dynamic-island .logo {
            width: 140px;
            filter: drop-shadow(0 0 25px rgba(168, 85, 247, 0.4));
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .dynamic-island.scrolled .logo {
            width: 100px;
        }

        .dynamic-island:hover .logo {
            transform: scale(1.1) rotate(-2deg);
            filter: drop-shadow(0 0 40px rgba(168, 85, 247, 0.8));
        }

        .dynamic-island .logo img {
            width: 100%;
            height: auto;
        }

        .dynamic-island .header-right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* View Toggle */
        .view-toggle-wrapper {
            display: flex;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
            padding: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-right: 5px;
        }

        .view-toggle-btn {
            padding: 8px 16px;
            border-radius: 16px;
            background: transparent;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.8rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: inherit;
            text-transform: uppercase;
        }

        .view-toggle-btn.active {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
        }

        .live-pulse-small {
            width: 8px;
            height: 8px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff4444;
            animation: pulseRed 1.5s infinite;
            display: inline-block;
        }

        /* Search Input */
        .search-wrapper {
            position: relative;
        }

        .search-input {
            width: 200px;
            padding: 10px 16px 10px 40px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 20px;
            color: #ffffff;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .dynamic-island.scrolled .search-input {
            width: 140px;
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
        }

        /* Language Selector */
        .custom-lang-wrapper {
            position: relative;
            min-width: 65px;
        }

        .lang-button {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            color: #ffffff;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .lang-dropdown {
            position: absolute;
            top: calc(100% + 10px);
            left: 50%;
            transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.8);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 14px;
            padding: 6px;
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s ease;
            z-index: 100;
        }

        .custom-lang-wrapper.open .lang-dropdown {
            opacity: 1;
            visibility: visible;
        }

        .lang-option {
            padding: 8px 16px;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .lang-option:hover, .lang-option.active {
            background: rgba(255, 255, 255, 0.15);
            color: #ffffff;
        }

        /* Hero & Animated Title */
        .hero {
            text-align: center;
            padding: 50px 0 20px;
            margin-bottom: 20px;
            position: relative;
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 700px; height: 700px;
            background: radial-gradient(circle, rgba(147, 51, 234, 0.12) 0%, transparent 70%);
            pointer-events: none;
            animation: heroGlow 4s ease-in-out infinite;
        }

        @keyframes heroGlow {
            0%, 100% { opacity: 0.8; transform: translate(-50%, -50%) scale(1); }
            50%       { opacity: 1;   transform: translate(-50%, -50%) scale(1.1); }
        }

        .title {
            font-size: 7rem;
            font-weight: 900;
            letter-spacing: -4px;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 25px rgba(147, 51, 234, 0.4));
        }

        .title-letter {
            display: inline-block;
            background: linear-gradient(120deg,
                #a855f7 0%, #a855f7 35%,
                rgba(255,255,255,0.85) 50%,
                #a855f7 65%, #a855f7 100%);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation:
                letterDrop 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards,
                titleShine 1.8s linear infinite;
            opacity: 0;
            transform: translateY(-80px);
        }

        @keyframes letterDrop {
            0%   { transform: translateY(-80px); opacity: 0; }
            60%  { transform: translateY(8px);   opacity: 1; }
            100% { transform: translateY(0);     opacity: 1; }
        }

        @keyframes titleShine {
            0%   { background-position: 100% center; }
            100% { background-position: -100% center; }
        }

        .subtitle {
            font-size: 1.25rem;
            color: rgba(255, 255, 255, 0.75);
            max-width: 700px;
            margin: 0 auto;
            line-height: 1.6;
        }

        /* Stats Block */
        .stats-block {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 40px;
        }

        .stat-item {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-5px);
            background: rgba(255, 255, 255, 0.06);
        }

        .stat-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
        }

        .stat-value.highlight {
            color: #FFD700;
        }

        /* Nav Tabs */
        .nav-tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 40px;
            overflow-x: auto;
            padding-bottom: 10px;
        }

        .tab-btn {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 15px;
            padding: 15px 25px;
            cursor: pointer;
            color: rgba(255, 255, 255, 0.6);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.3);
            color: #ffffff;
            transform: translateY(-5px);
        }

        .tab-icon img {
            width: 40px;
            height: 40px;
        }

        /* Ranking Table */
        .ranking-table {
            width: 100%;
            border-collapse: collapse;
            background: rgba(20, 20, 25, 0.6);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking-table th {
            padding: 20px;
            text-align: left;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ranking-table td {
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* ── Leaderboard table rows ── */
        .leaderboard-row {
            transition: background 0.3s ease;
            cursor: pointer;
        }

        .leaderboard-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        /* Top 1/2/3 row tints */
        .leaderboard-row.top-1 { background: rgba(255, 215, 0,  0.04); }
        .leaderboard-row.top-2 { background: rgba(192, 192, 192, 0.04); }
        .leaderboard-row.top-3 { background: rgba(205, 127, 50, 0.04); }

        /* Rank column */
        .col-rank {
            width: 90px;
            vertical-align: middle;
        }

        .rank-standard {
            font-size: 1.6rem;
            font-weight: 900;
            color: rgba(255,255,255,0.5);
            padding-left: 20px;
        }

        /* Diagonal ribbon banners for #1 #2 #3 */
        .rank-banner {
            display: inline-flex;
            align-items: center;
            padding: 8px 28px 8px 20px;
            clip-path: polygon(0 0, 100% 0, 88% 100%, 0 100%);
            font-size: 1.8rem;
            font-weight: 900;
            color: #fff;
            border-radius: 4px 0 0 4px;
            min-width: 80px;
            text-shadow: 0 2px 6px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        .rank-banner::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 200%; height: 100%;
            background: linear-gradient(90deg, transparent 30%, rgba(255,255,255,0.35) 50%, transparent 70%);
            animation: bannerShine 3s infinite linear;
        }

        @keyframes bannerShine {
            0%   { left: -100%; }
            100% { left: 100%; }
        }

        .rank-banner.gold   { background: linear-gradient(135deg, #FFD700, #FFA500); box-shadow: 0 0 18px rgba(255,215,0,0.5); }
        .rank-banner.silver { background: linear-gradient(135deg, #D0D0D0, #A0A0A0); box-shadow: 0 0 18px rgba(200,200,200,0.4); }
        .rank-banner.bronze { background: linear-gradient(135deg, #CD7F32, #8B4513); box-shadow: 0 0 18px rgba(205,127,50,0.4); }

        /* Player cell */
        .player-info {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        /* Skin: use full body — natural portrait, no squish */
        .player-skin {
            width: 52px;
            height: 104px;        /* 1:2 aspect = full Minecraft body proportion */
            flex-shrink: 0;
            display: flex;
            align-items: flex-end;
            overflow: visible;
        }

        .player-skin img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            object-position: bottom center;
            filter: drop-shadow(0 6px 10px rgba(0,0,0,0.6));
            transition: transform 0.3s ease, filter 0.3s ease;
        }

        .leaderboard-row:hover .player-skin img {
            transform: scale(1.08) translateY(-4px);
            filter: drop-shadow(0 12px 18px rgba(0,0,0,0.7)) brightness(1.1);
        }

        /* Top-3 rows get taller skins */
        .leaderboard-row.top-1 .player-skin,
        .leaderboard-row.top-2 .player-skin,
        .leaderboard-row.top-3 .player-skin {
            width: 64px;
            height: 128px;
        }

        .player-name {
            font-weight: 800;
            font-size: 1.2rem;
            color: #ffffff;
        }

        .player-elo-info {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            margin-top: 3px;
        }

        .player-elo-highlight {
            color: #FFD700;
            font-weight: 800;
        }

        /* Modalities column */
        .col-modalities {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            flex-wrap: wrap;
        }

        .modality-group {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 6px 12px;
            border-radius: 12px;
            font-size: 0.8rem;
            transition: all 0.2s ease;
        }

        .modality-group:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-2px);
        }

        .modality-rank.top-1 { color: #FFD700; font-weight: 900; }
        .modality-rank.top-2 { color: #C0C0C0; font-weight: 900; }
        .modality-rank.top-3 { color: #CD7F32; font-weight: 900; }
        .modality-rank       { color: rgba(255,255,255,0.8); font-weight: 700; }

        .modality-icon {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }

        /* Live Fights Standing View */
        .live-view-container {
            padding: 40px 0;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .live-header {
            text-align: center;
            margin-bottom: 60px;
        }

        .live-header-title {
            font-size: 4rem;
            font-weight: 900;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            text-shadow: 0 0 30px rgba(255, 68, 68, 0.3);
        }

        .live-dot-large {
            width: 25px;
            height: 25px;
            background: #ff4444;
            border-radius: 50%;
            box-shadow: 0 0 20px #ff4444;
            animation: pulseRed 1.5s infinite;
        }

        @keyframes pulseRed {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .live-fights-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(450px, 1fr));
            gap: 30px;
        }

        .live-fight-card {
            background: rgba(25, 25, 30, 0.7);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            padding: 35px;
            display: flex;
            flex-direction: column;
            gap: 25px;
            transition: all 0.4s ease;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        .live-fight-card:hover {
            transform: translateY(-10px);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .fight-arena-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 15px;
        }

        .arena-mode {
            background: rgba(168, 85, 247, 0.2);
            border: 1px solid rgba(168, 85, 247, 0.4);
            padding: 5px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            font-weight: 800;
            color: #d8b4fe;
            text-transform: uppercase;
        }

        .fight-combatants {
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        .fighter {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            z-index: 2;
        }

        .fighter-skin-container {
            width: 100px;
            height: 200px;
            filter: drop-shadow(0 10px 20px rgba(0,0,0,0.5));
        }

        .fighter-skin-container img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .fighter-name {
            font-size: 1.3rem;
            font-weight: 900;
        }

        .fighter-elo {
            font-size: 0.9rem;
            color: #FFD700;
            background: rgba(0,0,0,0.4);
            padding: 4px 12px;
            border-radius: 10px;
        }

        .health-wrapper {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        .health-bar-container {
            width: 100%;
            height: 10px;
            background: rgba(0,0,0,0.5);
            border-radius: 5px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .health-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff4444, #ff8888);
            transition: width 0.3s ease;
        }

        .health-text {
            font-size: 0.8rem;
            color: #ff8888;
            font-weight: 800;
        }

        .fight-vs {
            position: absolute;
            left: 50%;
            top: 40%;
            transform: translate(-50%, -50%);
            font-size: 2.5rem;
            font-weight: 900;
            font-style: italic;
            color: rgba(255, 255, 255, 0.1);
            z-index: 1;
        }

        .no-fights-msg {
            text-align: center;
            padding: 100px 0;
            color: rgba(255, 255, 255, 0.4);
            font-size: 1.2rem;
        }

        /* Player Modal */
        .player-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .player-modal.active { display: flex; }

        .modal-overlay {
            position: absolute;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }

        .modal-content {
            background: rgba(25, 25, 30, 0.9);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
            width: 90%;
            max-width: 900px;
            max-height: 90vh;
            overflow-y: auto;
            position: relative;
            padding: 40px;
            z-index: 2001;
        }

        .modal-close {
            position: absolute;
            top: 20px; right: 20px;
            background: none; border: none;
            color: #fff; font-size: 2rem; cursor: pointer;
        }

        .modal-header {
            display: flex;
            align-items: center;
            gap: 30px;
            margin-bottom: 40px;
        }

        .modal-player-skin {
            width: 120px;
            height: 120px;
            border-radius: 20px;
        }

        .modal-player-name { font-size: 3rem; font-weight: 900; }

        .modal-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 40px;
        }

        .modal-stat-card {
            background: rgba(255,255,255,0.05);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
        }

        .modal-stat-value { font-size: 1.8rem; font-weight: 800; }
        .modal-stat-label { font-size: 0.7rem; color: rgba(255,255,255,0.5); text-transform: uppercase; }

        .modal-modality-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
        }

        @media (max-width: 768px) {
            .title { font-size: 3rem; }
            .live-header-title { font-size: 2rem; }
            .live-fights-grid { grid-template-columns: 1fr; }
            .modal-header { flex-direction: column; text-align: center; }
            .modal-stats-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop playsinline>
            <source src="./assets/bg-video.mp4" type="video/mp4">
        </video>
    </div>
    <div class="video-overlay"></div>

    <nav class="dynamic-island" id="dynamic-island">
        <div class="logo" onclick="scrollToTop()">
            <img src="./assets/logo.png" alt="NinjaPVP Logo">
        </div>

        <div class="header-right">
            <div class="view-toggle-wrapper">
                <button class="view-toggle-btn active" id="btn-leaderboard" onclick="switchView('leaderboard')">RANKING</button>
                <button class="view-toggle-btn" id="btn-live" onclick="switchView('live')">LIVE <span class="live-pulse-small"></span></button>
            </div>
            <div class="search-wrapper" id="search-container">
                <span class="search-icon">🔍</span>
                <input type="text" class="search-input" placeholder="Search player..." id="search-input">
            </div>
            <div class="custom-lang-wrapper" id="lang-selector-wrapper">
                <div class="lang-button" id="lang-btn">
                    <span id="lang-current">EN</span>
                    <span class="arrow">▼</span>
                </div>
                <div class="lang-dropdown">
                    <div class="lang-option active" data-value="en">EN</div>
                    <div class="lang-option" data-value="es">ES</div>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- LEADERBOARD VIEW -->
        <div id="leaderboard-view">
            <section class="hero">
                <h1 class="title" id="title"></h1>
                <p class="subtitle" id="hero-subtitle">The most competitive PvP server, featuring a fully custom and exclusive ELO ranking system.</p>
            </section>

            <section class="stats-block">
                <div class="stat-item">
                    <div class="stat-label">Top Player</div>
                    <div class="stat-value highlight" id="stat-top-player">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Active Players</div>
                    <div class="stat-value" id="stat-active-players">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Total Matches</div>
                    <div class="stat-value" id="stat-matches">-</div>
                </div>
                <div class="stat-item">
                    <div class="stat-label">Average ELO</div>
                    <div class="stat-value" id="stat-avg-elo">-</div>
                </div>
            </section>

            <nav class="nav-tabs" id="nav-tabs">
                <button class="tab-btn active" data-mode="overall">
                    <div class="tab-icon"><img src="./assets/earth.png" alt="Overall"></div>
                    <span>Overall</span>
                </button>
                <button class="tab-btn" data-mode="sword">
                    <div class="tab-icon"><img src="./assets/sword.png" alt="Sword"></div>
                    <span>Sword</span>
                </button>
                <button class="tab-btn" data-mode="pot">
                    <div class="tab-icon"><img src="./assets/potion.png" alt="Pot"></div>
                    <span>Pot</span>
                </button>
                <button class="tab-btn" data-mode="axe">
                    <div class="tab-icon"><img src="./assets/axe.png" alt="Axe"></div>
                    <span>Axe</span>
                </button>
                <button class="tab-btn" data-mode="mace">
                    <div class="tab-icon"><img src="./assets/mace.png" alt="Mace"></div>
                    <span>Mace</span>
                </button>
                <button class="tab-btn" data-mode="netherop">
                    <div class="tab-icon"><img src="./assets/netherop.png" alt="NetherOP"></div>
                    <span>NetherOP</span>
                </button>
                <button class="tab-btn" data-mode="smp">
                    <div class="tab-icon"><img src="./assets/smp.png" alt="SMP"></div>
                    <span>SMP</span>
                </button>
                <button class="tab-btn" data-mode="uhc">
                    <div class="tab-icon"><img src="./assets/uhc.png" alt="UHC"></div>
                    <span>UHC</span>
                </button>
                <button class="tab-btn" data-mode="vanilla">
                    <div class="tab-icon"><img src="./assets/vanilla.png" alt="Vanilla"></div>
                    <span>Vanilla</span>
                </button>
            </nav>

            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>POS</th>
                        <th>PLAYER</th>
                        <th style="text-align: right;">MODALITIES</th>
                    </tr>
                </thead>
                <tbody id="ranking-body">
                    <!-- Loaded via script.js -->
                </tbody>
            </table>
        </div>

        <!-- LIVE VIEW -->
        <div id="live-view" style="display: none;" class="live-view-container">
            <div class="live-header">
                <h1 class="live-header-title">
                    <div class="live-dot-large"></div>
                    <span id="live-fights-title">LIVE FIGHTS</span>
                </h1>
            </div>
            <div class="live-fights-grid" id="fights-list">
                <!-- Loaded via inline script -->
            </div>
        </div>

        <!-- Player Profile Modal -->
        <div id="player-modal" class="player-modal">
            <div class="modal-overlay" onclick="closePlayerModal()"></div>
            <div class="modal-content">
                <button class="modal-close" onclick="closePlayerModal()">×</button>
                <div class="modal-header">
                    <img id="modal-player-skin" class="modal-player-skin" src="" alt="Player Skin">

                        <p id="modal-player-elo" class="modal-player-elo">ELO: 0</p>

    <script src="script.js"></script>
    <script>
        // Server Stats
        async function fetchServerStatus() {
            try {
                const response = await fetch('https://api.mcsrvstat.us/2/ninjapvp.me');
                const data = await response.json();
                if (data.online) {
                    const activePlayersEl = document.getElementById('stat-active-players');
                    if (activePlayersEl) activePlayersEl.textContent = data.players.online;
                }
            } catch (e) { console.log("Status error", e); }
        }
        fetchServerStatus();
        setInterval(fetchServerStatus, 30000);

        // View Switching
        function switchView(view) {
            const btnLeaderboard = document.getElementById('btn-leaderboard');
            const btnLive = document.getElementById('btn-live');
            const viewLeaderboard = document.getElementById('leaderboard-view');
            const viewLive = document.getElementById('live-view');
            const searchContainer = document.getElementById('search-container');

            if (view === 'leaderboard') {
                btnLeaderboard.classList.add('active');
                btnLive.classList.remove('active');
                viewLeaderboard.style.display = 'block';
                viewLive.style.display = 'none';
                searchContainer.style.display = 'block';
            } else {
                btnLive.classList.add('active');
                btnLeaderboard.classList.remove('active');
                viewLive.style.display = 'block';
                viewLeaderboard.style.display = 'none';
                searchContainer.style.display = 'none';
                updateLiveFights(); // Immediate update
            }
        }

        // Live Fights Rendering
        const fightsList = document.getElementById('fights-list');
        const liveFightsTitle = document.getElementById('live-fights-title');

        async function updateLiveFights() {
            if (document.getElementById('live-view').style.display === 'none') return;
            
            try {
                const response = await fetch('http://ninjapvp.tarohosting.com:8080/live');
                if (!response.ok) throw new Error('Offline');
                const fights = await response.json();
                
                liveFightsTitle.textContent = currentLang === 'en' ? 'LIVE FIGHTS' : 'PELEAS EN VIVO';
                
                if (!fights || fights.length === 0) {
                    fightsList.innerHTML = `<div class="no-fights-msg">${currentLang === 'en' ? 'No active fights at the moment.' : 'No hay combates activos en este momento.'}</div>`;
                    return;
                }
                
                fightsList.innerHTML = fights.map(f => {
                    const p1HealthPercent = Math.max(0, Math.min(100, (f.p1Health / 20.0) * 100));
                    const p2HealthPercent = Math.max(0, Math.min(100, (f.p2Health / 20.0) * 100));
                    
                    return `
                    <div class="live-fight-card">
                        <div class="fight-arena-info">
                            <span class="arena-mode">${f.mode}</span>
                            <span style="font-size: 0.7rem; color: rgba(255,255,255,0.3);">${f.world}</span>
                        </div>
                        <div class="fight-combatants">
                            <div class="fighter">
                                <div class="fighter-skin-container">
                                    <img src="https://mc-heads.net/body/${f.p1}/200" alt="${f.p1}">
                                </div>
                                <span class="fighter-name">${f.p1}</span>
                                <span class="fighter-elo">${f.p1Elo} ELO</span>
                                <div class="health-wrapper">
                                    <div class="health-bar-container"><div class="health-fill" style="width: ${p1HealthPercent}%;"></div></div>
                                    <span class="health-text">${f.p1Health} ♥</span>
                                </div>
                            </div>
                            
                            <div class="fight-vs">VS</div>
                            
                            <div class="fighter">
                                <div class="fighter-skin-container">
                                    <img src="https://mc-heads.net/body/${f.p2}/200" alt="${f.p2}" style="transform: scaleX(-1);">
                                </div>
                                <span class="fighter-name">${f.p2}</span>
                                <span class="fighter-elo">${f.p2Elo} ELO</span>
                                <div class="health-wrapper">
                                    <div class="health-bar-container"><div class="health-fill" style="width: ${p2HealthPercent}%;"></div></div>
                                    <span class="health-text">${f.p2Health} ♥</span>
                                </div>
                            </div>
                        </div>
                    </div>`;
                }).join('');
            } catch (e) {
                fightsList.innerHTML = `<div class="no-fights-msg">${currentLang === 'en' ? 'Connecting to server...' : 'Conectando al servidor...'}</div>`;
            }
        }

        setInterval(updateLiveFights, 3000);

        // Dynamic Island scroll effect
        window.addEventListener('scroll', () => {
            const island = document.getElementById('dynamic-island');
            if (window.scrollY > 100) island.classList.add('scrolled');
            else island.classList.remove('scrolled');
        });

        // Initialize Title Animation — letter-drop with purple shine
        function createAnimatedTitle() {
            const el = document.getElementById('title');
            if (!el) return;
            const text = 'NinjaPVP';
            el.innerHTML = '';
            text.split('').forEach((letter, i) => {
                const span = document.createElement('span');
                span.textContent = letter;
                span.className = 'title-letter';
                span.style.animationDelay = `${i * 0.09}s`;
                el.appendChild(span);
            });
        }
        createAnimatedTitle();

    </script>
</body>
